name: Build and Test LLM Examples

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mac_llm_build_and_test:
    name: Build and Test LLM Examples
    runs-on: macos-26

    env:
      REPO_URL: https://github.com/ml-explore/mlx-swift-examples.git
      REPO_DIR: mlx-swift-examples

    steps:
      - name: Clone original mlx-swift-examples repository
        shell: bash
        run: |
          set -euxo pipefail

          git clone \
            --recursive \
            "$REPO_URL" \
            "$REPO_DIR"

          cd "$REPO_DIR"

          echo "Cloned repository:"
          git remote -v

          echo ""
          echo "Current commit:"
          git rev-parse HEAD

          echo ""
          echo "Current branch:"
          git branch --show-current || true

          echo ""
          echo "Repository status:"
          git status --short

          echo ""
          echo "Submodule status:"
          git submodule status --recursive || true

          echo ""
          echo "Top-level files:"
          ls -la

      - name: Print Apple toolchain details
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          echo "xcode-select:"
          xcode-select -p

          echo ""
          echo "Installed Xcode apps:"
          ls -d /Applications/Xcode*.app || true

          echo ""
          echo "Xcode:"
          xcodebuild -version

          echo ""
          echo "SDK build version:"
          xcrun --show-sdk-build-version

          echo ""
          echo "Swift:"
          swift --version

          echo ""
          echo "Available SDKs:"
          xcodebuild -showsdks

      - name: Verify MetalToolchain installed
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild -showComponent MetalToolchain

      - name: Clean Xcode and package resolution state
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          echo "Removing DerivedData..."
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

          echo "Removing Package.resolved files..."
          find . -name Package.resolved -print -exec rm {} \;

      - name: List LLM-focused repository contents
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          echo "LLM applications:"
          find Applications \
            -maxdepth 2 \
            \( -path '*LLMBasic*' -o -path '*LLMEval*' -o -path '*MLXChatExample*' -o -path '*LoRATrainingExample*' \) \
            -print | sort

          echo ""
          echo "LLM tool:"
          find Tools/llm-tool -maxdepth 3 -print | sort

          echo ""
          echo "LLM/VLM/token/model-related files:"
          find . \
            \( -iname '*llm*' \
            -o -iname '*vlm*' \
            -o -iname '*lora*' \
            -o -iname '*llama*' \
            -o -iname '*mistral*' \
            -o -iname '*qwen*' \
            -o -iname '*phi*' \
            -o -iname '*token*' \
            -o -iname '*transformer*' \) \
            -print | sort

      - name: Show Xcode schemes
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild -list

      - name: Build package for testing
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild \
            build-for-testing \
            -scheme mlx-libraries-Package \
            -destination 'platform=macOS' \
            -skipMacroValidation

      - name: Build llm-tool
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild \
            -scheme llm-tool \
            -destination 'platform=macOS' \
            -skipMacroValidation

      - name: Build LLMBasic app
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild \
            -scheme LLMBasic \
            -destination 'platform=macOS' \
            -skipMacroValidation

      - name: Build LLMEval app
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild \
            -scheme LLMEval \
            -destination 'platform=macOS' \
            -skipMacroValidation

      - name: Build MLXChatExample app
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild \
            -scheme MLXChatExample \
            -destination 'platform=macOS' \
            -skipMacroValidation

      - name: Build LoRATrainingExample app
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          xcodebuild \
            -scheme LoRATrainingExample \
            -destination 'platform=macOS' \
            -skipMacroValidation

      - name: Run llm-tool help smoke test
        shell: bash
        run: |
          set -euxo pipefail

          cd "$REPO_DIR"

          chmod +x ./mlx-run

          ./mlx-run llm-tool --help || ./mlx-run llm-tool help || true

      - name: Print LLM diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e

          cd "$REPO_DIR"

          echo "Git status:"
          git status --short

          echo ""
          echo "Current commit:"
          git rev-parse HEAD

          echo ""
          echo "Remote:"
          git remote -v

          echo ""
          echo "Available schemes:"
          xcodebuild -list

          echo ""
          echo "Recent DerivedData logs:"
          find ~/Library/Developer/Xcode/DerivedData \
            -type f \
            \( -name '*.xcactivitylog' -o -name '*.log' \) \
            -print | sort | tail -50

          echo ""
          echo "LLM-related files:"
          find . \
            \( -iname '*llm*' \
            -o -iname '*vlm*' \
            -o -iname '*lora*' \
            -o -iname '*llama*' \
            -o -iname '*mistral*' \
            -o -iname '*qwen*' \
            -o -iname '*phi*' \
            -o -iname '*token*' \
            -o -iname '*transformer*' \) \
            -print | sort
